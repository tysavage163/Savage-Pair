<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SΛVΛGΞ TECH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body { 
            background: linear-gradient(rgba(10, 0, 15, 0.85), rgba(15, 0, 10, 0.9)), 
                        url('https://raw.githubusercontent.com/tysavage163/Savage-Pair/main/bg.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #A020F0; 
            font-family: 'SF Pro Display', sans-serif;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            min-height: 100vh; 
            padding: 20px;
        }

        .header { margin-bottom: 30px; text-align: center; }
        .system-title { color: #A020F0; font-size: 32px; font-weight: bold; letter-spacing: 4px; text-shadow: 0 0 15px #A020F0; }
        
        /* Auto-Typing SVG Header */
        .typing-container { margin: 10px 0; height: 30px; }

        .pair-card {
            background: rgba(15, 0, 10, 0.7);
            border: 1px solid rgba(160, 32, 240, 0.4);
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 30px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            text-align: center;
        }

        .input-group { position: relative; margin-bottom: 20px; }
        input { 
            background: rgba(0, 0, 0, 0.6); 
            border: 1px solid rgba(160, 32, 240, 0.6); 
            color: #fff; 
            padding: 18px; 
            width: 100%;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            transition: 0.3s;
        }
        input:focus { border-color: #FF1493; box-shadow: 0 0 15px rgba(255, 20, 147, 0.4); }

        button { 
            background: linear-gradient(135deg, #A020F0 0%, #6600cc 100%); 
            color: #fff; 
            border: none; 
            padding: 18px; 
            border-radius: 12px;
            font-weight: bold; 
            font-size: 16px;
            letter-spacing: 2px;
            cursor: pointer; 
            width: 100%;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(160, 32, 240, 0.6); }

        /* Code Display Area */
        #code-display {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(160, 32, 240, 0.1);
            border: 1px dashed rgba(160, 32, 240, 0.5);
            display: none; /* Hidden until generated */
            cursor: pointer;
        }
        #result { font-size: 32px; color: #FF1493; font-weight: bold; letter-spacing: 5px; text-shadow: 0 0 10px #FF1493; }
        .copy-hint { font-size: 10px; color: #fff; opacity: 0.5; margin-top: 5px; text-transform: uppercase; }

        .info-box { margin-top: 25px; text-align: left; font-size: 12px; color: rgba(255,255,255,0.6); line-height: 1.6; }
        .info-box span { color: #FF1493; font-weight: bold; }

        .footer { margin-top: 40px; font-size: 11px; color: #fff; opacity: 0.4; letter-spacing: 1px; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://raw.githubusercontent.com/tysavage163/Savage-Pair/main/song.m4a" type="audio/mp4">
    </audio>

    <div class="header">
        <div class="system-title">SΛVΛGΞ TECH</div>
        <div class="typing-container">
            <img src="https://readme-typing-svg.herokuapp.com?font=Fira+Code&size=14&pause=1000&color=FF1493&center=true&vCenter=true&width=300&lines=CORE+SYSTEM+ACTIVE;ESTABLISHING+SESSION...;WAITING+FOR+INPUT...;SΛVΛGΞ+V1.0.4" />
        </div>
    </div>

    <div class="pair-card">
        <div class="input-group">
            <input type="text" id="number" placeholder="eg. 2547XXXXXXXX">
        </div>

        <button onclick="getCode()" id="genBtn">GENERATE PAIR CODE</button>
        
        <div id="code-display" onclick="copyCode()">
            <div id="result"></div>
            <div class="copy-hint">📑 Click to copy code</div>
        </div>

        <div class="info-box">
            • Include <span>country code</span> (no + sign)<br>
            • Code expires in <span>60 seconds</span><br>
            • Linked Devices > <span>Link with phone number</span>
        </div>
    </div>

    <div class="footer">
        Inspired by Meryl
    </div>

    <script>
        async function getCode() {
            const num = document.getElementById('number').value;
            const resDiv = document.getElementById('result');
            const display = document.getElementById('code-display');
            const btn = document.getElementById('genBtn');
            const music = document.getElementById('bgMusic');
            
            music.play().catch(() => {});

            if(!num || !num.startsWith("254")) return alert("Enter valid number starting with 254");

            btn.innerText = "REQUESTING...";
            
            try {
                const response = await fetch(`/code?number=${num}`);
                const data = await response.json();
                
                if(data.code) {
                    display.style.display = "block";
                    resDiv.innerText = data.code;
                    btn.innerText = "CODE GENERATED";
                } else {
                    alert("System Busy. Retry.");
                    btn.innerText = "GENERATE PAIR CODE";
                }
            } catch (e) { 
                alert("Connection Error"); 
                btn.innerText = "GENERATE PAIR CODE";
            }
        }

        function copyCode() {
            const code = document.getElementById('result').innerText;
            navigator.clipboard.writeText(code);
            alert("Code copied to clipboard: " + code);
        }
    </script>
</body>
</html>
